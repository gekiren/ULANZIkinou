<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../libs/css/uspi.css">
  <style>
    /* Premium Styling */
    body {
      background: #12131C;
      color: #E2E8F0;
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      overflow-x: hidden;
    }
    
    .uspi-wrapper {
      background: rgba(30, 41, 59, 0.4);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
    }

    .form-group {
      margin-bottom: 0px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: #94A3B8;
      display: block;
    }

    .info-box {
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
      font-size: 13px;
      color: #A7F3D0;
      line-height: 1.5;
    }

    .info-box-title {
      font-weight: bold;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      font-size: 14px;
    }

    /* Active status pulse */
    .status-pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10B981;
      animation: pulse 1.5s infinite;
      margin-right: 8px;
    }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0.5; }
    }

    /* Premium Toggle Switch CSS */
    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }

    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #1E293B;
      transition: .3s;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 12px;
      width: 12px;
      left: 3px;
      bottom: 3px;
      background-color: #94A3B8;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #10B981;
      border-color: #10B981;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
      background-color: #F8FAFC;
    }
  </style>
  <script src="../libs/js/constants.js"></script>
  <script src="../libs/js/eventEmitter.js"></script>
  <script src="../libs/js/timers.js"></script>
  <script src="../libs/js/utils.js"></script>
  <script src="../libs/js/ulanziApi.js"></script>
</head>
<body>
  <div class="uspi-wrapper">
    <div class="form-group">
      <div class="switch-container">
        <label class="form-label" for="sim-mode" data-localize="Simulation Mode">シミュレーションモード</label>
        <label class="switch">
          <input type="checkbox" id="sim-mode">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="info-box">
      <div class="info-box-title">
        <span class="status-pulse"></span>
        <span data-localize="Display Toggle">Display Toggle</span>
      </div>
      <div id="desc-text" data-localize="Description Text">キーを押してPC画面のみと拡張表示をトグルします。</div>
    </div>
  </div>

  <script>
    // アクションのUUIDと接続
    $UD.connect('com.ulanzi.ulanzistudio.displaytoggle.toggle');

    const simModeCheckbox = document.getElementById('sim-mode');
    const descText = document.getElementById('desc-text');

    $UD.onConnected(() => {
      console.log("[PropertyInspector] Connected to websocket. Requesting settings...");
      // 初期設定を取得
      $UD.getSettings();
    });

    // 設定復元処理
    function applySettings(settings) {
      if (settings && typeof settings.simulationMode !== 'undefined') {
        simModeCheckbox.checked = settings.simulationMode;
        updateDescription(settings.simulationMode);
      }
    }

    function updateDescription(isSim) {
      if (isSim) {
        descText.textContent = "シミュレーション中（物理画面を変更せず、画像のみ切り替えます）";
      } else {
        descText.textContent = "キーを押してPC画面のみと拡張表示をトグルします。";
      }
    }

    // 上位機から設定値を受信
    $UD.on('didReceiveSettings', (message) => {
      console.log("[PropertyInspector] didReceiveSettings:", message);
      applySettings(message.settings);
    });

    $UD.on('paramfromapp', (message) => {
      console.log("[PropertyInspector] paramfromapp:", message);
      applySettings(message.param);
    });

    // 設定変更イベント
    simModeCheckbox.addEventListener('change', (e) => {
      const isSim = e.target.checked;
      console.log("[PropertyInspector] simulationMode changed:", isSim);
      updateDescription(isSim);

      const context = `${$UD.uuid}___${$UD.key}___${$UD.actionid}`;
      $UD.setSettings({ simulationMode: isSim }, context);
    });
  </script>
</body>
</html>
